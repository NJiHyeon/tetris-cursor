<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1 class="title">테트리스</h1>

    <div class="game-layout">
      <!-- 게임 보드 -->
      <section class="board-section" aria-label="게임 보드">
        <div id="board" class="board"></div>
        <div id="game-over" class="game-over" hidden>
          <p class="game-over-text">게임 오버</p>
          <p class="game-over-hint">Restart 버튼을 눌러 다시 시작하세요</p>
        </div>
      </section>

      <!-- 점수, 버튼, 조작법 -->
      <aside class="sidebar">
        <div class="panel score-panel">
          <h2 class="panel-title">점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <button id="start-btn" type="button" class="btn">Restart</button>

        <div class="panel controls-panel">
          <h2 class="panel-title">조작법</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 바닥까지 즉시 내리기</li>
          </ul>
        </div>
      </aside>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
